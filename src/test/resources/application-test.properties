# Connexion au MongoDB lancť par le service GitHub Actions
spring.data.mongodb.uri=mongodb://localhost:27017/testdb

# Dťsactiver les autres services inutiles pour ce test
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Props minimales pour satisfaire @Value dans RabbitMQConfig / RetryConfig pendant les tests
rabbitmq.retry.max-attempts=3
rabbitmq.queues.message=queue-message
rabbitmq.queues.message-dlq=queue-message.dlq
rabbitmq.exchanges.message=exchange-message
rabbitmq.exchanges.dlq=exchange-message.dlq
rabbitmq.routing-keys.message=routing-message
rabbitmq.routing-keys.dlq=routing-message.dlq
